<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Green circle background -->
  <circle cx="96" cy="96" r="96" fill="#34d399"/>

  <!-- Lotus flower - outer petals -->
  <g fill="#ffffff" opacity="0.9">
    <!-- Top petal -->
    <ellipse cx="96" cy="36" rx="18" ry="30" fill="#ffffff"/>

    <!-- Top-right petal -->
    <ellipse cx="136.8" cy="51.6" rx="18" ry="30" fill="#ffffff" transform="rotate(60 136.8 51.6)"/>

    <!-- Bottom-right petal -->
    <ellipse cx="136.8" cy="140.4" rx="18" ry="30" fill="#ffffff" transform="rotate(120 136.8 140.4)"/>

    <!-- Bottom petal -->
    <ellipse cx="96" cy="156" rx="18" ry="30" fill="#ffffff"/>

    <!-- Bottom-left petal -->
    <ellipse cx="55.2" cy="140.4" rx="18" ry="30" fill="#ffffff" transform="rotate(-120 55.2 140.4)"/>

    <!-- Top-left petal -->
    <ellipse cx="55.2" cy="51.6" rx="18" ry="30" fill="#ffffff" transform="rotate(-60 55.2 51.6)"/>
  </g>

  <!-- Inner circle with gradient effect -->
  <circle cx="96" cy="96" r="42" fill="#34d399"/>

  <!-- Center lotus detail -->
  <g fill="#ffffff" opacity="0.95">
    <!-- Inner petals (smaller) -->
    <ellipse cx="96" cy="72" rx="12" ry="18" fill="#ffffff"/>
    <ellipse cx="120" cy="96" rx="18" ry="12" fill="#ffffff"/>
    <ellipse cx="96" cy="120" rx="12" ry="18" fill="#ffffff"/>
    <ellipse cx="72" cy="96" rx="18" ry="12" fill="#ffffff"/>

    <!-- Center dot -->
    <circle cx="96" cy="96" r="7.5" fill="#34d399"/>
  </g>
</svg>
